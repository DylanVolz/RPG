<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<title>Task Viewer — KG</title>
<meta name="viewport" content="width=device-width, initial-scale=1"/>

<!-- Cytoscape + dagre layout via CDN (pattern matches survival-tools-browser.html's three.js import). -->
<script src="https://unpkg.com/cytoscape@3.29.0/dist/cytoscape.min.js"></script>
<script src="https://unpkg.com/dagre@0.8.5/dist/dagre.min.js"></script>
<script src="https://unpkg.com/cytoscape-dagre@2.5.0/cytoscape-dagre.js"></script>

<style>
  :root {
    --bg:        #0a0c0e;
    --bg-panel:  #0d0f12;
    --bg-elev:   #13161a;
    --fg:        #c8b89a;
    --fg-dim:    #8a7e68;
    --accent:    #d4a84b;
    --border:    rgba(200,184,154,0.18);
    --border-strong: rgba(200,184,154,0.45);

    --status-not-started:    #6b7076;
    --status-in-progress:    #4a8ccc;
    --status-completed:      #5c9c54;
    --status-completed-ai:   #7ab07e;
    --status-blocked:        #cc5c5c;
    --status-deprecated:     #4a4a4a;
    --status-superseded:     #4a4a4a;
    --status-future:         #8a6dcc;
    --status-skipped:        #4a4a4a;
  }
  * { box-sizing: border-box; }
  html, body {
    margin: 0; padding: 0; height: 100%;
    background: var(--bg); color: var(--fg);
    font-family: -apple-system, 'Segoe UI', sans-serif; font-size: 13px;
  }

  #app {
    display: grid;
    grid-template-rows: auto 1fr;
    grid-template-columns: 1fr 360px;
    grid-template-areas:
      "filters filters"
      "graph   details";
    height: 100vh;
    gap: 0;
  }
  #filters {
    grid-area: filters;
    background: var(--bg-panel); border-bottom: 1px solid var(--border);
    padding: 6px 10px;
    display: flex; flex-wrap: wrap; gap: 6px; align-items: center;
    font-size: 11px;
  }
  #filters select, #filters input {
    background: var(--bg-elev); color: var(--fg);
    border: 1px solid var(--border); padding: 3px 6px;
    font-size: 11px; outline: none;
  }
  #filters label { color: var(--fg-dim); letter-spacing: 0.5px; }
  #filters input[type=text] { min-width: 160px; }
  #filters input[type=checkbox] { accent-color: var(--accent); }
  #filters button {
    background: var(--bg-elev); color: var(--fg);
    border: 1px solid var(--border); padding: 3px 8px;
    font-size: 11px; cursor: pointer;
  }
  #filters button:hover { border-color: var(--border-strong); color: var(--accent); }
  #filters button.active { background: var(--accent); color: #111; border-color: var(--accent); }
  #status-badge {
    margin-left: auto; color: var(--fg-dim); font-size: 10px;
    letter-spacing: 1px; text-transform: uppercase;
  }

  #graph, #lanes {
    grid-area: graph;
    background: var(--bg);
    position: relative;
  }
  #graph { overflow: hidden; }
  #graph-host { position: absolute; inset: 0; }
  /* Lanes: one grid for the whole view — columns = global dep-rank, so a
     dependent task in room B always sits to the right of the task it depends
     on in room A. Overflow scrolls both axes. */
  #lanes {
    display: none; overflow: auto;
    --tile-w: 180px;
    --tile-h: 74px;
    --tile-gap: 6px;
    --lane-header-w: 150px;
  }
  #lanes.active { display: block; }
  #graph.hidden { display: none; }

  #lanes-grid {
    display: grid;
    /* columns = sticky header column + N rank columns, injected at render */
    grid-auto-rows: min-content;
    gap: var(--tile-gap);
    padding: 10px;
    align-items: start;
  }
  .lane-header {
    grid-column: 1;
    position: sticky; left: 10px; z-index: 2;
    background: var(--bg); padding: 6px 8px;
    border-left: 2px solid var(--accent);
    font-size: 11px; letter-spacing: 2px; text-transform: uppercase;
    color: var(--fg); font-weight: bold;
    height: var(--tile-h); display: flex; flex-direction: column; justify-content: center;
  }
  .lane-header .lane-count {
    display: block; color: var(--fg-dim); font-size: 9px;
    letter-spacing: 1px; margin-top: 3px; font-weight: normal;
    text-transform: none;
  }
  .rank-ruler {
    grid-row: 1; /* sit on top of the grid, before any lane header */
    position: sticky; top: 0; z-index: 3;
    background: var(--bg);
    font-size: 9px; color: var(--fg-dim); letter-spacing: 1px;
    text-align: center;
    padding: 4px 0; border-bottom: 1px solid var(--border);
  }
  .rank-ruler.rr-header {
    grid-column: 1; grid-row: 1;
    left: 10px; z-index: 4;  /* corner cell sticks both axes */
  }

  /* Task tile — bigger, multi-line, grid-placed by rank. */
  .task-pill {
    display: flex; flex-direction: column; justify-content: space-between;
    padding: 6px 8px; border: 1px solid rgba(255,255,255,0.15);
    background: var(--bg-elev); color: var(--fg);
    font-size: 11px; font-family: -apple-system, 'Segoe UI', sans-serif;
    cursor: pointer; transition: border-color 120ms, opacity 120ms, transform 120ms;
    min-width: 0; overflow: hidden;
    height: var(--tile-h);
    width: var(--tile-w);
    box-sizing: border-box;
  }
  .task-pill:hover { border-color: var(--border-strong); color: var(--accent); transform: translateY(-1px); }
  .task-pill.selected {
    border-color: #ffd76e; background: rgba(212,168,75,0.12); color: #ffd76e;
    box-shadow: 0 0 0 2px rgba(212,168,75,0.3);
  }
  .task-pill.dim { opacity: 0.15; pointer-events: none; }
  .task-pill.hidden { display: none !important; }
  .task-pill.mvp { border-color: var(--accent); }
  .task-pill.done { opacity: 0.55; }
  .task-pill.ready-marker { border-left: 3px solid #5c9c54; }

  .task-pill .pill-row1 {
    display: flex; align-items: center; gap: 5px; min-width: 0;
    font-family: ui-monospace, Menlo, monospace;
  }
  .task-pill .pill-row1 .dot {
    width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0;
  }
  .task-pill .pill-row1 .tid { font-weight: bold; font-size: 11px; }
  .task-pill .pill-row1 .typ {
    margin-left: auto; font-size: 9px; color: var(--fg-dim);
    letter-spacing: 1px; text-transform: uppercase; flex-shrink: 0;
  }
  .task-pill .pill-title {
    font-size: 11px; line-height: 1.25; color: var(--fg);
    overflow: hidden; text-overflow: ellipsis;
    display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical;
    flex: 1 1 auto; margin: 2px 0;
  }
  .task-pill .pill-meta {
    display: flex; align-items: center; gap: 4px; flex-wrap: nowrap;
    font-size: 9px; color: var(--fg-dim); letter-spacing: 0.5px;
    overflow: hidden; white-space: nowrap; text-overflow: ellipsis;
    min-height: 12px;
  }
  .task-pill .pill-meta .chip {
    padding: 0 4px; border: 1px solid rgba(200,184,154,0.18);
    border-radius: 2px; font-size: 9px; color: var(--fg-dim);
  }
  .task-pill .pill-meta .chip.ready { color: #5c9c54; border-color: rgba(92,156,84,0.45); }
  .task-pill .pill-meta .chip.mvp   { color: var(--accent); border-color: rgba(212,168,75,0.45); }
  .task-pill .pill-meta .chip.boost { color: #ff7a3d; border-color: rgba(255,122,61,0.55); font-weight: bold; }
  .task-pill .pill-meta .chip.urgent { color: #ff3d3d; border-color: rgba(255,61,61,0.7); font-weight: bold; background: rgba(255,61,61,0.12); }
  .task-pill .pill-meta .chip.high   { color: #ff9040; border-color: rgba(255,144,64,0.55); font-weight: bold; }
  .task-pill .pill-meta .chip.medium { color: #d4a84b; border-color: rgba(212,168,75,0.45); }
  .task-pill .pill-meta .chip.ea    { color: #d4a84b; border-color: rgba(212,168,75,0.35); }
  .task-pill.done .pill-title { text-decoration: line-through; opacity: 0.6; }
  /* Cross-lane dep ghost: marker in the DOWNSTREAM lane at the column of an
     UPSTREAM task. data-tid points at the upstream so clicks flow through the
     existing onPillTap → selectTask path. */
  .task-pill.ghost {
    background: transparent;
    border: 1px dashed rgba(124, 207, 212, 0.55);
    color: var(--fg-dim);
    opacity: 0.75;
  }
  .task-pill.ghost:hover {
    opacity: 1;
    border-color: #7ccfd4;
    color: #7ccfd4;
    transform: translateY(-1px);
  }
  .task-pill.ghost .pill-row1 .tid { color: inherit; }
  .task-pill.ghost .pill-title {
    color: var(--fg-dim); font-style: italic; font-size: 10px;
    -webkit-line-clamp: 1;
  }
  .task-pill.ghost .ghost-arrow {
    color: #7ccfd4; font-weight: bold; font-size: 12px; margin-right: 2px;
  }

  /* Walkthrough flags — teal accent, doesn't steal the status color. */
  .task-pill.walk-type { box-shadow: inset 3px 0 0 #7ccfd4; padding-left: 11px; }
  .task-pill .wt-badge {
    color: #7ccfd4; font-size: 9px; font-weight: bold; margin-right: 2px; flex-shrink: 0;
  }
  .task-pill .wv-badge {
    color: rgba(124, 207, 212, 0.55); font-size: 10px; margin-left: auto; flex-shrink: 0;
  }
  .task-pill.walk-type .wv-badge { display: none; }

  /* Mode banner (top of graph) when user is in "add dep" or "remove dep" mode. */
  #mode-banner {
    position: absolute; top: 8px; left: 50%; transform: translateX(-50%);
    background: rgba(212, 168, 75, 0.18); border: 1px solid var(--accent);
    color: var(--accent); padding: 4px 10px; font-size: 11px; letter-spacing: 1px;
    pointer-events: auto; display: none; z-index: 10;
  }
  #mode-banner.active { display: block; }
  #mode-banner button {
    margin-left: 10px; background: transparent; border: 1px solid var(--accent);
    color: var(--accent); padding: 1px 6px; font-size: 10px; cursor: pointer;
  }

  #details {
    grid-area: details;
    background: var(--bg-panel); border-left: 1px solid var(--border);
    overflow-y: auto; padding: 10px 12px;
  }
  #details h2 { margin: 0 0 4px; font-size: 16px; color: var(--accent); letter-spacing: 0.5px; }
  #details .tid { font-size: 11px; color: var(--fg-dim); letter-spacing: 2px; }
  #details section { margin-top: 12px; border-top: 1px solid var(--border); padding-top: 8px; }
  #details section h3 {
    margin: 0 0 6px; font-size: 10px; letter-spacing: 2px;
    color: var(--fg-dim); text-transform: uppercase;
  }
  #details .kv { display: flex; gap: 8px; padding: 2px 0; font-size: 12px; }
  #details .kv .k { color: var(--fg-dim); min-width: 110px; flex-shrink: 0; }
  #details .kv .v { color: var(--fg); word-break: break-word; }
  #details .chip {
    display: inline-block; padding: 1px 6px; border: 1px solid var(--border);
    border-radius: 2px; margin: 1px 3px 1px 0; font-size: 11px;
  }
  #details .chip.dep-link {
    cursor: pointer; color: var(--accent); border-color: var(--border-strong);
  }
  #details .chip.dep-link:hover { background: rgba(212, 168, 75, 0.1); }
  #details .chip.remove {
    cursor: pointer; color: var(--status-blocked); border-color: var(--status-blocked);
  }
  #details .chip.remove:hover { background: rgba(204, 92, 92, 0.12); }

  #details .actions { display: flex; flex-wrap: wrap; gap: 4px; margin-top: 6px; }
  #details .actions button {
    background: var(--bg-elev); color: var(--fg); border: 1px solid var(--border);
    padding: 4px 8px; font-size: 11px; cursor: pointer; letter-spacing: 0.5px;
  }
  #details .actions button:hover { border-color: var(--border-strong); color: var(--accent); }
  #details .actions button[disabled] { opacity: 0.4; cursor: not-allowed; }
  #details .actions button.danger { border-color: var(--status-blocked); color: var(--status-blocked); }

  #details .history-row {
    display: flex; gap: 8px; padding: 2px 0;
    font-size: 11px; color: var(--fg-dim);
  }
  #details .history-row .dot {
    width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; margin-top: 4px;
  }

  #toast {
    position: fixed; bottom: 12px; right: 12px;
    background: var(--bg-elev); border: 1px solid var(--border-strong);
    padding: 8px 12px; font-size: 12px; color: var(--fg);
    display: none; max-width: 400px; z-index: 100;
  }
  #toast.error { border-color: var(--status-blocked); color: var(--status-blocked); }

  /* Empty state */
  #empty {
    position: absolute; inset: 0; display: none;
    align-items: center; justify-content: center; color: var(--fg-dim);
    text-align: center; font-size: 13px; padding: 40px;
  }
  #empty.active { display: flex; }
</style>
</head>
<body>

<div id="app">
  <div id="filters">
    <label>type</label>
    <select id="f-type"><option value="">all</option></select>

    <label>status</label>
    <select id="f-status"><option value="">all</option></select>

    <label>room</label>
    <select id="f-room"><option value="">all</option></select>

    <label>cluster</label>
    <select id="f-cluster"><option value="">all</option></select>

    <label title="hide completed / deprecated / superseded / skipped — done work"><input type="checkbox" id="f-hide-done" checked/> hide done</label>
    <label><input type="checkbox" id="f-mvp"/> mvp only</label>
    <label><input type="checkbox" id="f-ready"/> ready only</label>
    <label title="type=walkthrough OR verifiable_by=walkthrough"><input type="checkbox" id="f-walk"/> walkthrough</label>
    <label title="show cross-lane dep markers in downstream lanes"><input type="checkbox" id="f-ghosts" checked/> cross-lane ghosts</label>

    <input type="text" id="f-search" placeholder="search title / id..."/>

    <button id="btn-refresh" title="re-fetch from API (Ctrl-R)">reload</button>
    <label title="auto-refresh every 10s — useful while synthesis is running">
        <input type="checkbox" id="f-autorefresh"/> auto-refresh
    </label>
    <span id="autorefresh-indicator" style="color:var(--fg-dim); font-size:10px; display:none;">· <span id="autorefresh-last">—</span></span>
    <button id="btn-fit" title="fit graph to viewport">fit</button>

    <span style="margin-left:8px; color:var(--fg-dim);">view</span>
    <button id="btn-view-graph" title="swimlane DAG">graph</button>
    <button id="btn-view-lanes" class="active" title="horizontal lanes table">lanes</button>

    <span class="tile-size-ctl" style="margin-left:8px; color:var(--fg-dim); display:flex; align-items:center; gap:4px;">
      tile
      <input type="range" id="f-tile-w" min="120" max="320" step="10" value="180" title="tile width" style="width:60px;">
      <input type="range" id="f-tile-h" min="48"  max="140" step="4"  value="74"  title="tile height" style="width:60px;">
    </span>

    <span id="status-badge">loading…</span>
  </div>

  <div id="graph">
    <div id="graph-host"></div>
    <div id="mode-banner">
      <span id="mode-text"></span>
      <button id="mode-cancel">cancel</button>
    </div>
    <div id="empty">No tasks match the current filters.</div>
  </div>

  <div id="lanes"><div id="lanes-grid"></div></div>

  <div id="details">
    <p style="color: var(--fg-dim); font-style: italic;">
      Click a task node to see its details. Click an edge to inspect / remove a dependency.
    </p>
  </div>
</div>

<div id="toast"></div>

<script type="module" src="./src/task-viewer-main.js"></script>
</body>
</html>
