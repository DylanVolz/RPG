<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Asset Browser — Three.js Game Editor</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { background:#0d0f12; font-family:'Georgia', serif; color:#c8b89a;
       display:flex; height:100vh; overflow:hidden; }

/* ── Sidebar ── */
#sidebar {
    width:340px; flex-shrink:0; background:#080a0c;
    border-right:1px solid rgba(200,184,154,0.08);
    display:flex; flex-direction:column; overflow:hidden;
}
#sidebar-header {
    padding:12px 12px 10px;
    border-bottom:1px solid rgba(200,184,154,0.08);
    flex-shrink:0;
}
#sidebar-title {
    font-size:9px; letter-spacing:4px; text-transform:uppercase;
    color:rgba(200,184,154,0.35); margin-bottom:10px;
}

/* Tabs */
#tabs { display:flex; gap:2px; flex-wrap:wrap; }
.tab {
    flex:1; min-width:0; padding:6px 4px; font-size:8px; letter-spacing:1px;
    text-transform:uppercase; text-align:center; cursor:pointer;
    background:rgba(200,184,154,0.04); border:1px solid rgba(200,184,154,0.1);
    color:rgba(200,184,154,0.4); transition:all 0.12s; white-space:nowrap;
}
.tab:hover  { background:rgba(200,184,154,0.08); color:rgba(200,184,154,0.7); }
.tab.active { background:rgba(200,184,154,0.14); color:#c8b89a;
              border-color:rgba(200,184,154,0.35); }

/* Search */
#search-wrap { padding:7px 8px; border-bottom:1px solid rgba(200,184,154,0.06); flex-shrink:0; }
#search {
    width:100%; background:rgba(200,184,154,0.05); border:1px solid rgba(200,184,154,0.1);
    color:#c8b89a; padding:7px 10px; font-family:'Georgia',serif;
    font-size:10px; letter-spacing:1px; outline:none;
}
#search::placeholder { color:rgba(200,184,154,0.2); }
#search:focus { border-color:rgba(200,184,154,0.3); }

/* Thumbnail grid */
#model-grid {
    display:grid;
    grid-template-columns: repeat(2, 1fr);
    gap:4px;
    padding:6px;
    overflow-y:auto;
    flex:1;
    scrollbar-width:thin; scrollbar-color:#2a2418 transparent;
    align-content: start;
}
.thumb-card {
    cursor:pointer;
    border:1px solid rgba(200,184,154,0.08);
    background:rgba(0,0,0,0.3);
    display:flex; flex-direction:column; align-items:center;
    padding:4px 4px 5px;
    transition:border-color 0.12s, background 0.12s;
    position:relative; overflow:hidden;
}
.thumb-card:hover {
    border-color:rgba(200,184,154,0.28);
    background:rgba(200,184,154,0.04);
}
.thumb-card.active {
    border-color:rgba(212,168,75,0.55);
    background:rgba(212,168,75,0.05);
}
.thumb-img {
    width:100%; aspect-ratio:1; display:block;
    object-fit:cover; background:#0a0c0f;
}
.thumb-card.loading .thumb-img {
    background: repeating-linear-gradient(
        45deg,
        rgba(200,184,154,0.03) 0px, rgba(200,184,154,0.03) 4px,
        transparent 4px, transparent 8px
    );
}
.thumb-card.thumb-error .thumb-img {
    background:#0a0c0f;
}
.thumb-card.thumb-error::before {
    content:'⚠';
    position:absolute; top:50%; left:50%;
    transform:translate(-50%,-70%);
    font-size:16px; opacity:0.2;
}
.thumb-name {
    font-size:8px; letter-spacing:0.3px;
    color:rgba(200,184,154,0.45); text-align:center;
    margin-top:4px;
    overflow:hidden; text-overflow:ellipsis; white-space:nowrap;
    max-width:100%; width:100%;
}
.thumb-card.active .thumb-name { color:rgba(212,168,75,0.8); }

#model-count {
    padding:6px 10px; font-size:9px; letter-spacing:2px;
    color:rgba(200,184,154,0.2);
    border-top:1px solid rgba(200,184,154,0.06);
    flex-shrink:0;
}

/* ── Anim panel ── */
#anim-panel {
    border-top:1px solid rgba(200,184,154,0.08);
    display:none; flex-direction:column; max-height:40%;
    flex-shrink:0;
}
#anim-header {
    padding:7px 12px; font-size:9px; letter-spacing:3px;
    text-transform:uppercase; color:rgba(200,184,154,0.3);
    flex-shrink:0;
}
#anim-search {
    background:rgba(200,184,154,0.04); border:none;
    border-bottom:1px solid rgba(200,184,154,0.08);
    color:#c8b89a; padding:7px 12px; font-family:'Georgia',serif;
    font-size:10px; letter-spacing:1px; outline:none; width:100%;
    flex-shrink:0;
}
#anim-search::placeholder { color:rgba(200,184,154,0.2); }
#clip-list {
    overflow-y:auto; flex:1;
    scrollbar-width:thin; scrollbar-color:#2a2418 transparent;
}
.clip-item {
    padding:6px 12px; font-size:9px; letter-spacing:0.3px;
    cursor:pointer; border-bottom:1px solid rgba(200,184,154,0.04);
    transition:background 0.1s; display:flex; justify-content:space-between;
}
.clip-item:hover  { background:rgba(200,184,154,0.07); }
.clip-item.active { background:rgba(200,184,154,0.14); color:#fff; }
.clip-item .dur   { font-size:9px; opacity:0.3; }

/* ── Viewport ── */
#viewport { flex:1; position:relative; background:#111418; }
#viewport canvas { display:block; width:100% !important; height:100% !important; }

#vp-label {
    position:absolute; top:16px; left:50%; transform:translateX(-50%);
    color:rgba(200,184,154,0.5); font-size:11px; letter-spacing:3px;
    text-transform:uppercase; pointer-events:none; text-align:center;
    line-height:1.8; white-space:pre; text-shadow:0 1px 4px rgba(0,0,0,0.8);
}
#vp-hint {
    position:absolute; bottom:16px; right:16px;
    color:rgba(200,184,154,0.18); font-size:9px; letter-spacing:1px;
    line-height:2; text-align:right; pointer-events:none;
}
#vp-loading {
    position:absolute; top:50%; left:50%; transform:translate(-50%,-50%);
    color:rgba(200,184,154,0.4); font-size:11px; letter-spacing:4px;
    text-transform:uppercase; display:none;
}
</style>

<script type="module">
import * as THREE from 'three';

// ═══════════════════════════════════════════════════════════════

        'Wall_UnevenBrick_Window_Wide_Flat','Wall_UnevenBrick_Window_Wide_Round',

        'Roof_RoundTiles_4x4','Roof_RoundTiles_4x6','Roof_RoundTiles_6x6','Roof_RoundTiles_6x8',
        'Roof_RoundTiles_8x8','Roof_2x4_RoundTile','Roof_Dormer_RoundTile','Roof_Tower_RoundTiles',
        'Roof_Front_Brick4','Roof_Front_Brick6','Roof_Front_Brick8',
        'Door_1_Flat','Door_1_Round','Door_2_Flat','Door_2_Round','Door_4_Flat','Door_4_Round',
        'Window_Thin_Flat1','Window_Thin_Round1','Window_Wide_Flat1','Window_Wide_Round1',
        'WindowShutters_Wide_Flat_Open','WindowShutters_Wide_Round_Open',
        'Balcony_Simple_Straight','Balcony_Cross_Straight',
        'Stair_Interior_Simple','Stair_Interior_Solid',
        'Stairs_Exterior_Straight','Stairs_Exterior_Platform',
        'Prop_Chimney','Prop_Chimney2','Prop_Support','Prop_Wagon','Prop_Crate',
        'Prop_WoodenFence_Single','Prop_MetalFence_Simple',

        'Key_Gold','Key_Metal','Lantern_Wall','Mug',

// ═══════════════════════════════════════════════════════════════
//  SCÈNE PRINCIPALE
// ═══════════════════════════════════════════════════════════════
const vp = document.getElementById('viewport');
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x111418);
scene.fog = new THREE.FogExp2(0x111418, 0.04);

const camera = new THREE.PerspectiveCamera(50, vp.clientWidth / vp.clientHeight, 0.05, 200);
camera.position.set(0, 1.5, 4);

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
renderer.setSize(vp.clientWidth, vp.clientHeight);
renderer.outputColorSpace = THREE.SRGBColorSpace;
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
renderer.localClippingEnabled = true;
vp.appendChild(renderer.domElement);

const controls = new OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;
controls.dampingFactor = 0.07;
controls.minDistance = 0.3;
controls.maxDistance = 80;
controls.update();

scene.add(new THREE.AmbientLight(0xffd8a0, 0.6));
const sun = new THREE.DirectionalLight(0xfff4d0, 2.5);
sun.position.set(5, 8, 4);
sun.castShadow = true;
sun.shadow.mapSize.set(2048, 2048);
sun.shadow.camera.near = 0.5; sun.shadow.camera.far = 60;
sun.shadow.camera.left = -20; sun.shadow.camera.right = 20;
sun.shadow.camera.top  =  20; sun.shadow.camera.bottom = -20;
scene.add(sun);
const fill = new THREE.DirectionalLight(0x8090b0, 0.7);
fill.position.set(-4, 3, -4); scene.add(fill);
const rim = new THREE.DirectionalLight(0xffaa44, 0.9);
rim.position.set(0, 4, -6); scene.add(rim);

const floor = new THREE.Mesh(
    new THREE.CircleGeometry(30, 64),
    new THREE.MeshStandardMaterial({ color: 0x181410, roughness: 0.95 })
);
floor.rotation.x = -Math.PI / 2; floor.receiveShadow = true; scene.add(floor);

const ring = new THREE.Mesh(
    new THREE.RingGeometry(1.2, 1.27, 72),
    new THREE.MeshBasicMaterial({ color: 0x3a2e1a, side: THREE.DoubleSide })
);
ring.rotation.x = -Math.PI / 2; ring.position.y = 0.002; scene.add(ring);

const grid = new THREE.GridHelper(20, 20, 0x201810, 0x1a140c);
grid.position.y = 0.001; scene.add(grid);

// ═══════════════════════════════════════════════════════════════
//  RENDERER OFFSCREEN — génération des thumbnails
// ═══════════════════════════════════════════════════════════════
const THUMB_SIZE = 128;
const thumbR = new THREE.WebGLRenderer({ antialias: false, alpha: true });
thumbR.setSize(THUMB_SIZE, THUMB_SIZE);
thumbR.setPixelRatio(1);
thumbR.outputColorSpace = THREE.SRGBColorSpace;

const thumbScene = new THREE.Scene();
thumbScene.background = new THREE.Color(0x0d1014);
const thumbCam = new THREE.PerspectiveCamera(42, 1, 0.01, 300);

thumbScene.add(new THREE.AmbientLight(0xffd8a0, 0.9));
const tSun = new THREE.DirectionalLight(0xffffff, 2.8);
tSun.position.set(3, 5, 3); thumbScene.add(tSun);
const tFill = new THREE.DirectionalLight(0x8090c0, 0.6);
tFill.position.set(-3, 2, -2); thumbScene.add(tFill);
const tRim = new THREE.DirectionalLight(0xffaa44, 0.8);
tRim.position.set(0, 3, -5); thumbScene.add(tRim);

const gltfLoader = new GLTFLoader();
const _gltfCache = {};

function loadGLTF(url) {
    if (_gltfCache[url]) return Promise.resolve(_gltfCache[url]);
    return new Promise((res, rej) =>
        gltfLoader.load(url, g => { _gltfCache[url] = g; res(g); }, undefined, rej)
    );
}

let _thumbRoot = null;
function _clearThumbScene() {
    if (!_thumbRoot) return;
    thumbScene.remove(_thumbRoot);
    _thumbRoot.traverse(n => {
        if (n.geometry) n.geometry.dispose();
        if (n.material) {
            (Array.isArray(n.material) ? n.material : [n.material])
                .forEach(m => m?.dispose());
        }
    });
    _thumbRoot = null;
}

async function renderThumb(item) {
    _clearThumbScene();
    const gltf = await loadGLTF(item.src);
    const root = gltf.scene.clone(true);
    root.traverse(c => {
        if (!c.isMesh) return;
        c.frustumCulled = false;
        const mats = Array.isArray(c.material) ? c.material : [c.material];
        mats.forEach(m => { if (m) { m.side = THREE.DoubleSide; m.clippingPlanes = []; } });
    });

    // Normaliser la taille à 2 unités
    const box0 = new THREE.Box3().setFromObject(root);
    const size0 = box0.getSize(new THREE.Vector3());
    const maxDim = Math.max(size0.x, size0.y, size0.z) || 1;
    root.scale.setScalar(2 / maxDim);

    // Centrer
    const box1 = new THREE.Box3().setFromObject(root);
    const center = box1.getCenter(new THREE.Vector3());
    root.position.sub(center);

    thumbScene.add(root);
    _thumbRoot = root;

    // Caméra légèrement au-dessus et de face
    const dist = 3.2;
    thumbCam.position.set(dist * 0.5, dist * 0.35, dist);
    thumbCam.lookAt(0, 0, 0);
    thumbCam.updateProjectionMatrix();

    thumbR.render(thumbScene, thumbCam);
    return thumbR.domElement.toDataURL('image/jpeg', 0.85);
}

// Queue séquentielle avec IntersectionObserver
const _thumbQueue = [];
let _thumbBusy = false;

async function _processQueue() {
    if (_thumbBusy) return;
    _thumbBusy = true;
    while (_thumbQueue.length > 0) {
        const { item, card, img } = _thumbQueue.shift();
        if (!card.isConnected) continue;
        try {
            const url = await renderThumb(item);
            img.src = url;
            card.classList.remove('loading');
        } catch {
            card.classList.remove('loading');
            card.classList.add('thumb-error');
        }
    }
    _thumbBusy = false;
}

const _thumbObserver = new IntersectionObserver(entries => {
    let added = false;
    for (const e of entries) {
        if (!e.isIntersecting) continue;
        _thumbObserver.unobserve(e.target);
        const card = e.target;
        if (card._thumbDone) continue;
        card._thumbDone = true;
        const img = card.querySelector('.thumb-img');
        _thumbQueue.push({ item: card._item, card, img });
        added = true;
    }
    if (added) _processQueue();
}, { root: document.getElementById('model-grid'), rootMargin: '80px' });

// ═══════════════════════════════════════════════════════════════
//  ÉTAT SCÈNE PRINCIPALE
// ═══════════════════════════════════════════════════════════════
let currentMdl = null, mixer = null, activeAction = null;
let ualLoaded  = false;
let allClips   = [], animFilter = '';
let bodyClipPlane = null, headBone = null;
const headBoneWP  = new THREE.Vector3();

async function loadUAL() {
    if (ualLoaded) return;
    allClips = [];
    document.getElementById('clip-list').innerHTML =
        '<div style="padding:8px 14px;font-size:9px;opacity:.3;letter-spacing:2px">CHARGEMENT...</div>';
    const results = await Promise.allSettled(UAL_PATHS.map(p => loadGLTF(p)));
    const clipMap = new Map();
    for (const r of results) {
        if (r.status === 'fulfilled') {
            for (const clip of r.value.animations) clipMap.set(clip.name, clip);
        }
    }
    allClips  = [...clipMap.values()].sort((a, b) => a.name.localeCompare(b.name));
    ualLoaded = true;
    if (currentMdl?._animated) rebuildClips();
}

// ═══════════════════════════════════════════════════════════════
//  ATTACHEMENT CORPS DE BASE
// ═══════════════════════════════════════════════════════════════
const HEAD_MESHES = new Set(['Eyebrows', 'Eyes', 'SuperHero_Male', 'SuperHero_Female']);

function attachBody(baseGltf, outfitRoot) {
    bodyClipPlane = new THREE.Plane(new THREE.Vector3(0, 1, 0), 0);
    headBone = null;
    const outfitBones = {};
    outfitRoot.traverse(n => { if (n.isBone) outfitBones[n.name] = n; });
    headBone = outfitBones['head'] || outfitBones['Head'] || null;

    const toAttach = [];
    baseGltf.scene.traverse(n => {
        if (n.isSkinnedMesh && HEAD_MESHES.has(n.name)) toAttach.push(n);
    });
    for (const node of toAttach) {
        const newBones = node.skeleton.bones.map(b => outfitBones[b.name]);
        if (newBones.some(b => !b)) continue;
        const newSkeleton = new THREE.Skeleton(newBones, node.skeleton.boneInverses);
        node.position.set(0,0,0); node.rotation.set(0,0,0); node.scale.set(1,1,1);
        node.bind(newSkeleton, new THREE.Matrix4());
        const isBody = node.name === 'SuperHero_Male' || node.name === 'SuperHero_Female';
        const clonedMats = (Array.isArray(node.material) ? node.material : [node.material])
            .map(m => m ? m.clone() : m);
        node.material = Array.isArray(node.material) ? clonedMats : clonedMats[0];
        for (const m of clonedMats) if (m) {
            m.side = THREE.DoubleSide;
            if (isBody) m.clippingPlanes = [bodyClipPlane];
        }
        node.castShadow = true; node.frustumCulled = false;
        outfitRoot.add(node);
    }
}

// ═══════════════════════════════════════════════════════════════
//  CHARGEMENT MODÈLE (viewport principal)
// ═══════════════════════════════════════════════════════════════
function loadModel(item) {
    if (activeAction) { activeAction.stop(); activeAction = null; }
    if (mixer)        { mixer.stopAllActions(); mixer = null; }
    if (currentMdl)   { scene.remove(currentMdl._root); currentMdl = null; }
    bodyClipPlane = null; headBone = null;

    document.getElementById('vp-loading').style.display = 'block';
    document.getElementById('vp-label').textContent = item.name;

    const pOutfit = loadGLTF(item.src);
    const pBody   = item.bodyUrl ? loadGLTF(item.bodyUrl) : Promise.resolve(null);

    Promise.all([pOutfit, pBody]).then(([gltf, bodyGltf]) => {
        document.getElementById('vp-loading').style.display = 'none';

        const root = item.animated
            ? SkeletonUtils.clone(gltf.scene)
            : gltf.scene.clone(true);

        root.traverse(c => {
            if (!c.isMesh) return;
            c.castShadow = c.receiveShadow = true;
            c.frustumCulled = false;
            (Array.isArray(c.material) ? c.material : [c.material])
                .forEach(m => { if (m) m.side = THREE.DoubleSide; });
        });

        const box0 = new THREE.Box3().setFromObject(root);
        root.scale.setScalar(1.75 / (box0.max.y - box0.min.y || 1));
        if (bodyGltf) attachBody(bodyGltf, root);
        scene.add(root);

        const box  = new THREE.Box3().setFromObject(root);
        root.position.y -= box.min.y;
        const size   = box.getSize(new THREE.Vector3());
        const maxDim = Math.max(size.x, size.y, size.z);
        const center = new THREE.Vector3(0, size.y * 0.5, 0);

        controls.target.copy(center);
        const dist = maxDim * 1.8;
        camera.position.set(dist * 0.6, center.y + dist * 0.3, dist);
        controls.minDistance = maxDim * 0.1;
        controls.maxDistance = maxDim * 12;
        controls.update();

        currentMdl = { _root: root, _animated: !!item.animated };
        document.getElementById('anim-panel').style.display =
            item.animated ? 'flex' : 'none';

        if (item.animated) {
            mixer = new THREE.AnimationMixer(root);
            if (ualLoaded) rebuildClips(); else loadUAL();
        }
    }).catch(err => {
        document.getElementById('vp-loading').style.display = 'none';
        document.getElementById('vp-label').textContent = '⚠ ' + err.message;
    });
}

// ── Clips ──────────────────────────────────────────────────────
function rebuildClips() {
    if (!ualLoaded || !mixer) return;
    renderClipList();
    const idle = allClips.find(c => c.name.toLowerCase().includes('idle_loop'))
              || allClips.find(c => c.name.toLowerCase().includes('idle'))
              || allClips[0];
    if (idle) playClip(idle);
}

function renderClipList() {
    const term = animFilter.toLowerCase();
    const list = allClips.filter(c => !term || c.name.toLowerCase().includes(term));
    const el   = document.getElementById('clip-list');
    el.innerHTML = '';
    for (const clip of list) {
        const div = document.createElement('div');
        div.className = 'clip-item';
        div.innerHTML = `<span>${clip.name}</span><span class="dur">${clip.duration.toFixed(2)}s</span>`;
        div.addEventListener('click', () => {
            document.querySelectorAll('.clip-item').forEach(b => b.classList.remove('active'));
            div.classList.add('active');
            playClip(clip);
        });
        el.appendChild(div);
    }
}

function playClip(clip) {
    if (!mixer) return;
    if (activeAction) activeAction.fadeOut(0.2);
    const action = mixer.clipAction(clip);
    action.reset().fadeIn(0.2).play();
    activeAction = action;
}

// ═══════════════════════════════════════════════════════════════
//  UI — GRILLE DE THUMBNAILS
// ═══════════════════════════════════════════════════════════════
let currentCat = 'Personnages';
let searchTerm = '';

function renderGrid() {
    const items    = CATALOG[currentCat] || [];
    const term     = searchTerm.toLowerCase();
    const filtered = items.filter(i => !term || i.name.toLowerCase().includes(term));

    const el = document.getElementById('model-grid');
    el.innerHTML = '';

    for (const item of filtered) {
        const card = document.createElement('div');
        card.className = 'thumb-card loading';
        card._item = item;

        const img = document.createElement('img');
        img.className = 'thumb-img';
        img.alt = item.name;

        const label = document.createElement('div');
        label.className = 'thumb-name';
        label.textContent = item.name;

        card.appendChild(img);
        card.appendChild(label);
        card.addEventListener('click', () => {
            document.querySelectorAll('.thumb-card').forEach(c => c.classList.remove('active'));
            card.classList.add('active');
            loadModel(item);
        });
        el.appendChild(card);

        // Thumbnail générée dès que la card est visible
        _thumbObserver.observe(card);
    }

    document.getElementById('model-count').textContent =
        filtered.length + ' / ' + items.length + ' assets';
}

// Tabs
document.querySelectorAll('.tab').forEach(tab => {
    tab.addEventListener('click', () => {
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
        tab.classList.add('active');
        currentCat = tab.dataset.cat;
        document.getElementById('search').value = '';
        searchTerm = '';
        if (currentCat !== 'Personnages')
            document.getElementById('anim-panel').style.display = 'none';
        renderGrid();
    });
});

document.getElementById('search').addEventListener('input', e => {
    searchTerm = e.target.value;
    renderGrid();
});

document.getElementById('anim-search').addEventListener('input', e => {
    animFilter = e.target.value;
    renderClipList();
});

renderGrid();

// ═══════════════════════════════════════════════════════════════
//  BOUCLE
// ═══════════════════════════════════════════════════════════════
const clock = new THREE.Clock();
(function animate() {
    requestAnimationFrame(animate);
    const delta = clock.getDelta();
    if (mixer) mixer.update(delta);
    if (bodyClipPlane && headBone) {
        headBone.getWorldPosition(headBoneWP);
        bodyClipPlane.constant = -(headBoneWP.y - 0.22);
    }
    controls.update();
    renderer.render(scene, camera);
})();

window.addEventListener('resize', () => {
    camera.aspect = vp.clientWidth / vp.clientHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(vp.clientWidth, vp.clientHeight);
});
</script>
