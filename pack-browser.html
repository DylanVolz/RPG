<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Pack Browser</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { background:#0d0f12; font-family:'Georgia', serif; color:#c8b89a;
       display:flex; height:100vh; overflow:hidden; }

#sidebar {
    width:280px; flex-shrink:0; background:#0a0c0e;
    border-right:1px solid rgba(200,184,154,0.1);
    display:flex; flex-direction:column; overflow:hidden;
}
#pack-pick {
    background:rgba(200,184,154,0.06); color:#d4a84b;
    border:none; border-bottom:1px solid rgba(200,184,154,0.12);
    padding:10px 14px; font-family:'Georgia',serif;
    font-size:11px; letter-spacing:2px; text-transform:uppercase;
    outline:none; width:100%; cursor:pointer;
    appearance:none; -webkit-appearance:none;
    background-image:linear-gradient(45deg, transparent 50%, rgba(200,184,154,0.4) 50%),
                     linear-gradient(135deg, rgba(200,184,154,0.4) 50%, transparent 50%);
    background-position:calc(100% - 18px) 50%, calc(100% - 13px) 50%;
    background-size:5px 5px, 5px 5px;
    background-repeat:no-repeat;
}
#pack-pick:hover { background-color:rgba(200,184,154,0.1); }
#pack-pick option { background:#0a0c0e; color:#c8b89a; }
#search {
    background:rgba(200,184,154,0.06); border:none;
    border-bottom:1px solid rgba(200,184,154,0.1);
    color:#c8b89a; padding:12px 14px; font-family:'Georgia',serif;
    font-size:11px; letter-spacing:1px; outline:none; width:100%;
}
#search::placeholder { color:rgba(200,184,154,0.25); }
#categories { display:flex; flex-wrap:wrap; gap:4px; padding:8px; border-bottom:1px solid rgba(200,184,154,0.08); }
.cat-btn {
    background:rgba(200,184,154,0.06); border:1px solid rgba(200,184,154,0.15);
    color:rgba(200,184,154,0.5); padding:3px 8px; font-size:9px;
    letter-spacing:1px; cursor:pointer; transition:all 0.1s; text-transform:uppercase;
}
.cat-btn:hover, .cat-btn.active { background:rgba(200,184,154,0.15); color:#c8b89a; border-color:rgba(200,184,154,0.4); }

#filters { padding:8px 14px; font-size:10px; border-bottom:1px solid rgba(200,184,154,0.08); display:flex; gap:10px; align-items:center; }
#filters label { color:rgba(200,184,154,0.5); }
#filters input[type=range] { flex:1; }

#list { overflow-y:auto; flex:1; scrollbar-width:thin; scrollbar-color:#2a2418 transparent; }
.item {
    padding:8px 14px; font-size:10px; letter-spacing:0.5px;
    cursor:pointer; border-bottom:1px solid rgba(200,184,154,0.04);
    transition:background 0.1s; display:flex; justify-content:space-between; gap:6px;
}
.item .name { overflow:hidden; text-overflow:ellipsis; white-space:nowrap; flex:1; }
.item .meta { font-size:9px; color:rgba(200,184,154,0.3); flex-shrink:0; }
.item:hover  { background:rgba(200,184,154,0.08); }
.item.active { background:rgba(200,184,154,0.15); color:#fff; }
#count { padding:8px 14px; font-size:9px; letter-spacing:2px; color:rgba(200,184,154,0.25); border-top:1px solid rgba(200,184,154,0.08); }

#main { flex:1; display:flex; min-width:0; }
#viewport { flex:1; position:relative; min-width:0; }
#details {
    width:320px; flex-shrink:0; background:#0a0c0e;
    border-left:1px solid rgba(200,184,154,0.1);
    display:flex; flex-direction:column;
}
#viewport canvas { display:block; width:100% !important; height:100% !important; }
#obj-name {
    position:absolute; top:16px; left:50%; transform:translateX(-50%);
    color:rgba(200,184,154,0.5); font-size:11px; letter-spacing:3px;
    text-transform:uppercase; pointer-events:none; text-align:center;
}
#obj-details {
    position:absolute; top:44px; left:50%; transform:translateX(-50%);
    color:rgba(200,184,154,0.4); font-size:10px; letter-spacing:2px;
    pointer-events:none; text-align:center; font-variant-numeric: tabular-nums;
}
#hint {
    position:absolute; bottom:16px; right:16px;
    color:rgba(200,184,154,0.2); font-size:9px; letter-spacing:1px;
    line-height:2; text-align:right; pointer-events:none;
}
#ref-hint {
    position:absolute; bottom:16px; left:16px;
    color:rgba(200,184,154,0.3); font-size:9px; letter-spacing:1px;
    line-height:1.6; pointer-events:none;
}
#loading-overlay {
    position:absolute; inset:0; background:rgba(13,15,18,0.7);
    display:flex; align-items:center; justify-content:center;
    color:rgba(200,184,154,0.4); font-size:11px; letter-spacing:3px;
    pointer-events:none; opacity:0; transition:opacity 0.2s;
}
#loading-overlay.visible { opacity:1; }
</style>
<script type="importmap">
{
  "imports": {
    "three":         "https://cdn.jsdelivr.net/npm/three@0.165.0/build/three.module.js",
    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.165.0/examples/jsm/"
  }
}
</script>
</head>
<body>

<div id="sidebar">
    <select id="pack-pick" title="Select asset library"></select>
    <input id="search" type="text" placeholder="Search...">
    <div id="categories"></div>
    <div id="filters">
        <label for="max-h">≤ h/player</label>
        <input id="max-h" type="range" min="0.1" max="8" step="0.1" value="8">
        <span id="max-h-val">∞</span>
    </div>
    <div id="list"></div>
    <div id="count"></div>
</div>

<div id="main">
    <div id="viewport">
        <div id="obj-name">—</div>
        <div id="obj-details"></div>
        <div id="loading-overlay">Loading...</div>
        <div id="ref-hint">1.5 m player reference cube shown in scene<br>(player 1.5m · voxel 0.5m)</div>
        <div id="hint">Right-click + drag: orbit<br>Wheel: zoom<br>Left-click + drag: pan</div>
    </div>
    <div id="details"></div>
</div>

<script type="module">
import * as THREE from 'three';
import { GLTFLoader }    from 'three/addons/loaders/GLTFLoader.js';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
import { loadManifest, assetUrl, groupByCategory } from './src/manifest-loader.js';
import { MetaPanel } from './src/meta-panel.js';
import { PACKS, PACKS_BY_SLUG, DEFAULT_PACK } from './src/pack-config.js';

const metaPanel = new MetaPanel(document.getElementById('details'));

const PLAYER_H = 1.5; // game constant, matches tools/measure_gltf_pack.py

// ── URL state ─────────────────────────────────────────────────────
// Filters + selection live in window.location.search so a refresh
// (or copy-paste of the URL) restores the same view. Defaults are
// elided so the URL stays readable.
const URL_DEFAULTS = { pack: DEFAULT_PACK, q: '', cat: 'all', maxH: 8, sel: '' };

function readUrl() {
    const p = new URLSearchParams(location.search);
    const pack = p.get('pack');
    return {
        pack: (pack && PACKS_BY_SLUG[pack]) ? pack : URL_DEFAULTS.pack,
        q:    p.get('q')   ?? URL_DEFAULTS.q,
        cat:  p.get('cat') ?? URL_DEFAULTS.cat,
        maxH: parseFloat(p.get('maxH')) || URL_DEFAULTS.maxH,
        sel:  p.get('sel') ?? URL_DEFAULTS.sel,
    };
}

function writeUrl() {
    const cur = {
        pack: currentPack.slug,
        q:    searchTerm,
        cat:  activeCat,
        maxH: maxH === Infinity ? URL_DEFAULTS.maxH : Number(maxH.toFixed(1)),
        sel:  currentRow ? currentRow.name : '',
    };
    const p = new URLSearchParams();
    if (cur.pack !== URL_DEFAULTS.pack) p.set('pack', cur.pack);
    if (cur.q && cur.q !== URL_DEFAULTS.q) p.set('q', cur.q);
    if (cur.cat !== URL_DEFAULTS.cat) p.set('cat', cur.cat);
    if (cur.maxH !== URL_DEFAULTS.maxH) p.set('maxH', String(cur.maxH));
    if (cur.sel) p.set('sel', cur.sel);
    const qs = p.toString();
    history.replaceState(null, '', location.pathname + (qs ? '?' + qs : '') + location.hash);
}

// ── Scene ─────────────────────────────────────────────────────────
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x14181d);
// Fog + near/far are retuned per-asset in loadRow() — this initial setup is
// just a placeholder while the manifest loads.
scene.fog = new THREE.FogExp2(0x14181d, 0.02);

const vp     = document.getElementById('viewport');
const camera = new THREE.PerspectiveCamera(50, vp.clientWidth / vp.clientHeight, 0.01, 2000);
camera.position.set(2, 2, 2.5);

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
renderer.setSize(vp.clientWidth, vp.clientHeight);
renderer.outputColorSpace = THREE.SRGBColorSpace;
renderer.shadowMap.enabled = true;
vp.appendChild(renderer.domElement);

const controls = new OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;
controls.dampingFactor = 0.08;
controls.update();

// Neutral studio lighting
scene.add(new THREE.AmbientLight(0xffffff, 0.9));
const sun = new THREE.DirectionalLight(0xffffff, 2.2);
sun.position.set(4, 8, 3);
sun.castShadow = true;
sun.shadow.mapSize.set(1024, 1024);
scene.add(sun);
const fill = new THREE.DirectionalLight(0x667788, 0.6);
fill.position.set(-4, 3, -4);
scene.add(fill);

// Ground plane for shadow — radius is resized in loadRow() to fit the asset.
const ground = new THREE.Mesh(
    new THREE.CircleGeometry(6, 64),
    new THREE.MeshStandardMaterial({ color: 0x20252c, roughness: 0.95 })
);
ground.rotation.x = -Math.PI / 2;
ground.receiveShadow = true;
scene.add(ground);

function setGroundRadius(r) {
    const clamped = Math.max(3, r);
    ground.geometry.dispose();
    ground.geometry = new THREE.CircleGeometry(clamped, 64);
}

// 1.5m player-height reference cube (semi-transparent, for scale).
// Sits flush with ground at x=-1.0 so it never occludes the previewed asset.
const refGeom = new THREE.BoxGeometry(0.4, PLAYER_H, 0.4);
const refMat = new THREE.MeshStandardMaterial({
    color: 0x88aaff, transparent: true, opacity: 0.18, roughness: 0.9,
});
const refCube = new THREE.Mesh(refGeom, refMat);
refCube.position.set(-1.0, PLAYER_H / 2, 0);
scene.add(refCube);

// ── Loading ───────────────────────────────────────────────────────
let current = null;
let currentRow = null;
const loader = new GLTFLoader();
const overlay = document.getElementById('loading-overlay');

function loadRow(row, opts = {}) {
    overlay.classList.add('visible');
    currentRow = row;
    metaPanel.show(currentPack.slug, row.name);

    document.getElementById('obj-name').textContent = row.name;
    document.getElementById('obj-details').textContent =
        `${row.category.toUpperCase()}  ·  ` +
        `${row.w_m.toFixed(2)} × ${row.h_m.toFixed(2)} × ${row.d_m.toFixed(2)} m  ·  ` +
        `${row.faces} faces  ·  ${(row.h_over_player*100).toFixed(0)}% of player`;
    document.querySelectorAll('.item').forEach(el => el.classList.toggle('active', el.dataset.name === row.name));

    if (current) { scene.remove(current); current = null; }

    if (opts.persistUrl !== false) writeUrl();

    loader.load(assetUrl(currentPack.vendor, currentPack.slug, row), (gltf) => {
        const obj = gltf.scene;
        obj.traverse(c => { if (c.isMesh) { c.castShadow = true; c.receiveShadow = true; } });

        const box = new THREE.Box3().setFromObject(obj);
        const ctr = box.getCenter(new THREE.Vector3());
        // Keep the model's original pose — only centre horizontally and sit on ground.
        obj.position.x -= ctr.x;
        obj.position.z -= ctr.z;
        obj.position.y -= box.min.y;

        scene.add(obj);
        current = obj;

        const size = Math.max(row.w_m, row.h_m, row.d_m);
        const dist = Math.max(size * 1.8, 0.8);
        controls.target.set(0, row.h_m * 0.5, 0);
        camera.position.set(dist * 0.7, dist * 0.6, dist * 0.9);
        // Scale the camera frustum so near is always well inside the asset
        // and far comfortably contains it + some orbit headroom.
        camera.near = Math.max(0.01, size * 0.01);
        camera.far = Math.max(200, size * 50);
        camera.updateProjectionMatrix();
        // Retune fog density so the asset never fogs out: at `dist` metres
        // we want fog contribution ~20%. FogExp2 contrib = 1 - exp(-d²·ρ²),
        // so ρ ≈ sqrt(-ln(0.8)) / dist ≈ 0.47 / dist.
        scene.fog.density = 0.47 / Math.max(dist, 2);
        // Grow the ground disc + reposition the 1.5 m player reference cube
        // so it stays visible and outside the asset's footprint.
        setGroundRadius(size * 2 + 3);
        refCube.position.x = -(Math.max(size, 1.5) * 0.5 + 0.6);
        controls.update();

        overlay.classList.remove('visible');
    }, undefined, (err) => {
        overlay.classList.remove('visible');
        console.error('Load failed for', row.path, err);
    });
}

// ── UI state ──────────────────────────────────────────────────────
let manifest = [];
let currentPack = PACKS_BY_SLUG[DEFAULT_PACK];
let activeCat = 'all';
let searchTerm = '';
let maxH = Infinity;

function rebuildCategoryButtons() {
    const grouped = groupByCategory(manifest);
    const counts = new Map();
    for (const [cat, rows] of grouped) counts.set(cat, rows.length);
    const cats = ['all', ...[...counts.keys()].sort((a, b) => counts.get(b) - counts.get(a))];
    // Drop activeCat if it doesn't exist in the new pack.
    if (activeCat !== 'all' && !counts.has(activeCat)) activeCat = 'all';
    const catEl = document.getElementById('categories');
    catEl.innerHTML = '';
    cats.forEach(cat => {
        const btn = document.createElement('div');
        btn.className = 'cat-btn' + (cat === activeCat ? ' active' : '');
        const n = cat === 'all' ? manifest.length : (counts.get(cat) || 0);
        btn.textContent = `${cat === 'all' ? 'ALL' : cat} (${n})`;
        btn.addEventListener('click', () => {
            activeCat = cat;
            document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            renderList();
            writeUrl();
        });
        catEl.appendChild(btn);
    });
}

function rebuildPackPicker() {
    const sel = document.getElementById('pack-pick');
    const sorted = [...PACKS].sort((a, b) => a.name.localeCompare(b.name));
    sel.innerHTML = sorted.map(p =>
        `<option value="${p.slug}">${p.icon ? p.icon + '  ' : ''}${p.name}</option>`
    ).join('');
    sel.value = currentPack.slug;
    sel.addEventListener('change', () => {
        switchPack(sel.value);
    });
}

document.getElementById('search').addEventListener('input', e => {
    searchTerm = e.target.value.toLowerCase();
    renderList();
    writeUrl();
});

const maxHInput = document.getElementById('max-h');
const maxHVal = document.getElementById('max-h-val');
maxHInput.addEventListener('input', e => {
    const v = parseFloat(e.target.value);
    maxH = v >= 7.99 ? Infinity : v;
    maxHVal.textContent = maxH === Infinity ? '∞' : maxH.toFixed(1);
    renderList();
    writeUrl();
});

function renderList() {
    const filtered = manifest.filter(row => {
        const catMatch = activeCat === 'all' || row.category === activeCat;
        const searchMatch = row.name.toLowerCase().includes(searchTerm)
            || row.category.toLowerCase().includes(searchTerm);
        const hMatch = row.h_over_player <= maxH;
        return catMatch && searchMatch && hMatch;
    });
    filtered.sort((a, b) => a.name.localeCompare(b.name));
    const listEl = document.getElementById('list');
    listEl.innerHTML = '';
    filtered.forEach(row => {
        const el = document.createElement('div');
        el.className = 'item' + (currentRow && currentRow.name === row.name ? ' active' : '');
        el.dataset.name = row.name;
        el.innerHTML = `<span class="name">${row.name}</span><span class="meta">${row.h_m.toFixed(2)}m</span>`;
        el.addEventListener('click', () => loadRow(row));
        listEl.appendChild(el);
    });
    document.getElementById('count').textContent = `${filtered.length} / ${manifest.length} assets`;
}

async function loadPack(pack, opts = {}) {
    currentPack = pack;
    document.title = `${pack.name} — Pack Browser`;
    document.getElementById('search').placeholder = `Search ${pack.name}...`;
    try {
        manifest = await loadManifest(pack.slug);
        console.log(`Loaded manifest: ${manifest.length} rows for ${pack.slug}`);
        rebuildCategoryButtons();
        renderList();
        if (manifest.length > 0) {
            const wantSel = opts.sel || '';
            const initial = (wantSel && manifest.find(r => r.name === wantSel))
                || [...manifest].sort((a, b) => a.name.localeCompare(b.name))[0];
            // Don't double-write the URL during boot — the caller normalises it.
            loadRow(initial, { persistUrl: false });
        } else {
            currentRow = null;
            document.getElementById('obj-name').textContent = '—';
            document.getElementById('obj-details').textContent = '';
        }
    } catch (err) {
        console.error('Manifest load failed:', err);
        document.getElementById('obj-name').textContent = 'MANIFEST LOAD FAILED';
        document.getElementById('obj-details').textContent = String(err);
    }
}

async function switchPack(slug) {
    const pack = PACKS_BY_SLUG[slug];
    if (!pack || pack.slug === currentPack.slug) return;
    // Switching pack invalidates the current selection / category.
    activeCat = 'all';
    currentRow = null;
    await loadPack(pack);
    writeUrl();
}

// ── Boot ──────────────────────────────────────────────────────────
(async () => {
    const url = readUrl();
    currentPack = PACKS_BY_SLUG[url.pack] || PACKS_BY_SLUG[DEFAULT_PACK];
    activeCat   = url.cat;
    searchTerm  = url.q;
    maxH        = url.maxH >= 7.99 ? Infinity : url.maxH;
    document.getElementById('search').value = searchTerm;
    maxHInput.value = url.maxH;
    maxHVal.textContent = maxH === Infinity ? '∞' : maxH.toFixed(1);
    rebuildPackPicker();
    await loadPack(currentPack, { sel: url.sel });
    writeUrl();
})();

(function animate() {
    requestAnimationFrame(animate);
    controls.update();
    renderer.render(scene, camera);
})();

window.addEventListener('resize', () => {
    camera.aspect = vp.clientWidth / vp.clientHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(vp.clientWidth, vp.clientHeight);
});
</script>
<script src="src/asset-check.js"></script>
<script src="src/nav.js"></script>
</body>
</html>
